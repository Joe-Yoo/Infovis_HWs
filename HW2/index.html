<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CS7450 - HW 2</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">

        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main id="charts">
            <div id="bar-chart">
                <h2>Average Monthly Precipitation in Inches (2020 - 2022)</h2>
                <select id="year-select">
                    <option value="all">All Years</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                </select>
                <div id="bar-chart-svg"></div>
            </div>

            <div id="scatterplot">
                <h2>Dewpoint vs. Pressure Scatterplot</h2>
                <select id="year-select-scatter">
                    <option value="all">All Years</option>
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                </select>
                <select id="month-select-scatter">
                    <option value="all">All Months</option>
                    <option value="0">January</option>
                    <option value="1">February</option>
                    <option value="2">March</option>
                    <option value="3">April</option>
                    <option value="4">May</option>
                    <option value="5">June</option>
                    <option value="6">July</option>
                    <option value="7">August</option>
                    <option value="8">September</option>
                    <option value="9">October</option>
                    <option value="10">November</option>
                    <option value="11">December</option>

                </select>
                <div id="scatterplot-svg"></div>
            </div>

            <div id="line-graph">
                <h2>Daily High & Low Temperature by Year</h2>
                <select id="year-select-line">
                    <option value="2020">2020</option>
                    <option value="2021">2021</option>
                    <option value="2022">2022</option>
                </select>
                <div id="line-graph-svg"></div>
            </div>

            <div id="calendar">
                <h2>calendar</h2>
            </div>
        </main>

        <script src="https://d3js.org/d3.v7.min.js"></script>
        <script src="script.js"></script>
        <script src="bar_chart.js"></script>
        <script src="scatterplot.js"></script>
        <script src="line_graph.js"></script>
        <script src="calendar.js"></script>
    </body>
</html>
